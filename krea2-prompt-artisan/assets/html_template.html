<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0d18;
      --panel: #171727;
      --panel-2: #0a0a14;
      --gold: #c9a87c;
      --gold-soft: #e8d5c4;
      --muted: #b0a090;
      --text: #d8c9b7;
      --cyan: #00ffcc;
      --border: rgba(201, 168, 124, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 18px;
      background: linear-gradient(135deg, #0d0d1a 0%, #111126 52%, #070714 100%);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .container {
      width: min(960px, 100%);
      margin: 0 auto;
      background: rgba(23, 23, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: clamp(22px, 4vw, 40px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0 0 24px;
      color: var(--gold-soft);
      text-align: center;
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 700;
      letter-spacing: 0;
      text-shadow: 0 0 10px rgba(232, 213, 196, 0.2);
    }

    .intro-box {
      margin-bottom: 28px;
      padding: 15px 18px;
      border-left: 4px solid var(--gold);
      border-radius: 0 8px 8px 0;
      background: rgba(201, 168, 124, 0.06);
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .section-title {
      margin: 34px 0 14px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(201, 168, 124, 0.22);
      color: var(--gold);
      font-size: 18px;
      font-weight: 650;
    }

    .prompt-card {
      background: var(--panel-2);
      border: 1px solid rgba(255, 105, 180, 0.28);
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 0 16px rgba(255, 105, 180, 0.05);
    }

    .prompt-block + .prompt-block { margin-top: 24px; }

    .sub-label {
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 14px;
      font-weight: 650;
    }

    .prompt-text,
    .translation-text {
      margin-bottom: 12px;
      padding: 14px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
      line-height: 1.65;
      font-size: 13px;
    }

    .prompt-text {
      max-height: 340px;
      overflow-y: auto;
      border: 1px solid rgba(0, 255, 204, 0.16);
      background: rgba(0, 0, 0, 0.42);
      color: var(--cyan);
      font-family: Consolas, "Courier New", monospace;
    }

    .translation-text {
      border: 1px solid rgba(201, 168, 124, 0.18);
      background: rgba(0, 0, 0, 0.34);
      color: #c9b8a4;
    }

    .copy-btn {
      display: block;
      margin: 0 auto;
      border: 0;
      border-radius: 20px;
      padding: 9px 22px;
      background: linear-gradient(135deg, #c9a87c 0%, #a8875a 100%);
      color: #121224;
      font: 700 14px "Segoe UI", sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(201, 168, 124, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .copy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(201, 168, 124, 0.48);
      background: linear-gradient(135deg, #e8c4a0 0%, #c9a87c 100%);
    }

    .copy-success {
      display: none;
      margin-top: 12px;
      color: var(--cyan);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .breakdown-table th,
    .breakdown-table td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      text-align: left;
      vertical-align: top;
    }

    .breakdown-table th {
      background: rgba(201, 168, 124, 0.1);
      color: var(--gold-soft);
      font-weight: 650;
    }

    .slot-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      line-height: 1.25;
    }

    .slot-cn {
      color: var(--cyan);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      font-weight: 700;
    }

    .slot-en {
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .breakdown-table td span:not(.slot-cn):not(.slot-en) {
      color: var(--muted);
      line-height: 1.55;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .poem-box {
      margin-top: 38px;
      text-align: center;
    }

    .footer-poem em {
      display: block;
      color: var(--gold);
      font: normal 18px "STKaiti", "KaiTi", serif;
      line-height: 1.8;
      text-shadow: 0 0 8px rgba(201, 168, 124, 0.3);
    }

    .footer-signature {
      margin-top: 28px;
      color: #6a5a4a;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0;
    }

    @media (max-width: 720px) {
      body { padding: 18px 10px; }
      .prompt-card { padding: 16px; }
      .breakdown-table { font-size: 13px; }
      .breakdown-table th,
      .breakdown-table td { padding: 10px 8px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>{{TITLE}}</h1>
    <div class="intro-box">{{INTRO_TEXT}}</div>

    <h2 class="section-title">✨ Krea 2 提示词</h2>
    <section class="prompt-card">
      <div class="prompt-block">
        <div class="sub-label">📝 English Prompt（英文提示词）</div>
        <div class="prompt-text" id="promptText">{{PROMPT_TEXT}}</div>
        <button class="copy-btn" onclick="copyText('promptText', 'copySuccessEn')">复制英文提示词</button>
        <div class="copy-success" id="copySuccessEn">✓ 英文提示词已复制！直接去 Krea 2 跑图吧！🌸</div>
      </div>

      <div class="prompt-block">
        <div class="sub-label">🌸 中文对照翻译</div>
        <div class="translation-text" id="translationText">{{TRANSLATION_TEXT}}</div>
        <button class="copy-btn" onclick="copyText('translationText', 'copySuccessCn')">复制中文翻译</button>
        <div class="copy-success" id="copySuccessCn">✓ 中文翻译已复制！🌸</div>
      </div>
    </section>

    <h2 class="section-title">🔍 槽位拆解与设计逻辑</h2>
    <table class="breakdown-table">
      <thead>
        <tr>
          <th style="width: 22%;">模块</th>
          <th style="width: 43%;">设计内容</th>
          <th style="width: 35%;">设计考虑</th>
        </tr>
      </thead>
      <tbody>{{BREAKDOWN_ROWS}}</tbody>
    </table>

    <h2 class="section-title">⚙️ 优化考量</h2>
    <ul>{{OPTIMIZATION_NOTES}}</ul>

    <div class="poem-box">
      <span class="footer-poem"><em>{{POEM}}</em></span>
    </div>

    <div class="footer-signature">{{SIGNATURE}}</div>
  </main>

  <script>
    function copyText(sourceId, successId) {
      var text = document.getElementById(sourceId).innerText;
      navigator.clipboard.writeText(text).then(function () {
        var successEl = document.getElementById(successId);
        successEl.style.display = 'block';
        setTimeout(function () {
          successEl.style.display = 'none';
        }, 4000);
      }, function () {
        alert('复制失败，请手动选择复制哦。');
      });
    }
  </script>
</body>
</html>
